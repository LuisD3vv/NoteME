<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Note ME!</title>
    <meta name="description" content="Pagina de notas a mi gusto" />
    <meta name="keywords" content="notas super anotaciones notas keypad keep" />
    <meta name="Author" content="Lissandro Dev" />
    <!-- <meta http-equiv="refresh" content="0; ">
    <meta http-equiv="refresh" content="5"> -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" />
  </head>
  <body>
    </div>
    <div class="contenedor">
      <div class="contenedor__notas--general">
        <h3 class="contenedor__notas--general--create">Añadir notas</h3>
        <section class="contenedor_creador">
          <div class="enviar_notas">
            <p>
              <label class="texto_nota_orden" for="titulo">Titulo</label>
              <input
                type="text"
                name="titulo"
                id="titulo"
                placeholder="Escribe aqui"
                autocomplete="off"
              />
            </p>
            <textarea
              name="titulo"
              id="contenido_nota"
              placeholder="Contenido de la nota"
              maxlength="450"
              
            ></textarea>
            <br />

            <button id="boton_crearNota" onclick="CrearNotas()">Crear</button>
          </div>
        </section>
        <hr class="divisor_line">
        <section class="contenedor_creador_extras">
          <div class="campos">
            <details>
              <!-- El elemento sumarry no es un hijo normal flex, se comporta como un componente especial, por lo cual no recibe el diplsay flex del padre,. por eso es mejor idea asilar lo que queremos que sea flex. -->
              <summary>Opciones</summary>
              <div class="campos_botones">
                <button class="notas_opciones--boton" id="borrarNota">Eliminar Nota</button>
                <button class="notas_opciones--boton" id="editarNota">Editar Nota</button>
                <button class="notas_opciones--boton" id="compartirNota">Compartir</button>
                <button class="notas_opciones--boton" id="compartirNota">proximamente</button>
                </div>
            </details>
          </div>
        </section>
      </div>
      <!--Seccion ver notas-->
      <div class="contenedor_notas--ver">
        <div class="header_ver-notas">
          <section class="contendor_general_titulo">
            <h3 class="contenedor_notas--titulo">
              Note ME!
            </h3>
          </section>
          <section class="cont_not">
            <select title="notas" name="OrderNotes" id="con_options">
              <option value="Ordenar" selected>Ordenar por</option>
              <option value="Categoria" id="categoria">Categoria</option>
              <option value="Fecha" id="op-fecha">Fecha</option>
              <option value="Tamaño" id="op-tamanio">Tamaño</option>
              <option value="alfa" id="op-afla">A-Z</option>
              <option value="ul-modi">Ultima modificación</option>
              <option value="pri-modi">Primera modificación</option>
            </select>
            <button id="EnviarOrden" onclick="CrearNotas()">Ordenar</button>
          </section>
        </div>
        <div id="contenedor_real"></div>
      </div>
    </div>
    <script src="script.js"></script>
    <footer>
      <a id="Author" href="https://github.com/LuisD3vv"
        >&copy 2025 LuisD3vv</a
      >
    </footer>
  </body>
</html>
