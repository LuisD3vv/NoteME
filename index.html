<!DOCTYPE html>
<html lang="es-mx">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>NoteME!</title>
    <meta name="description" content="Pagina de notas a mi gusto" />
    <meta name="keywords" content="notas super anotaciones notas keypad keep" />
    <meta name="Author" content="Lissandro Dev" />
    <!-- esto es solo para cuando cargamos el archivo con flask -->
    <link rel="stylesheet" href="static/styles.css"/> 
    <link rel="shortcut icon" href="img/notas.png" type="image/x-icon">
  </head>
  <body>
    </div>
    <div class="contenedor">
      <div class="contenedor__notas--general">
        <h3 class="contenedor__notas--general--create"> Nueva nota</h3>
        <section class="contenedor_creador">
          <div class="enviar_notas">
            <p>
              <label class="texto_nota_orden" for="titulo">Titulo</label>
              <input
                type="text"
                name="titulo"
                id="titulo"
                placeholder="Escribe aqui"
                autocomplete="off"
              />
            </p>
            <textarea
              name="titulo"
              id="contenido_nota"
              placeholder="Contenido de la nota"
              maxlength="450"
              
            ></textarea>
            <br />
            <label style="text-align: center;color: #e6e6e6;font-weight: bold;" for="tag">Etiquetas de la nota</label>
            <input id="tag" type="text" placeholder="e.g mates, idiomas" minlength="10">
            <button id="boton_crearNota" onclick="verificar_entradas_nota()">Crear</button>
          </div>
        </section>
        <hr class="divisor_line">
        <section class="contenedor_creador_extras">
          <div class="campos">
          </div>
        </section>
      </div>
      <!--Seccion ver notas-->
      <div class="contenedor_notas--ver">
        <div class="header_ver-notas">
          <section class="contendor_general_titulo">
            <div class="contenedor_notas--titulo">
            <h3>NoteME!</h3>
            </div>
          </section>
          <section class="cont_not">
            <select title="notas" name="OrderNotes" id="con_options">
              <option value="Ordenar" disabled selected>-- Ordenar por --</option>
              <option value="Etiqueta">Etiqueta</option>
              <option value="Fecha" >Fecha</option>
              <option value="alfa">A-Z</option>
              <option value="ul-modi">Ultima modificación</option>
              <option value="pri-modi">Primera modificación</option>
            </select>
            <button id="EnviarOrden">Ordenar</button>
          </section>
        </div>
        <div id="contenedor_real">

        </div>
      </div>
    </div>
    <script defer src="static/script.js">
    </script>
    <footer>
      <a id="Author" href="https://github.com/LuisD3vv"
        >&copy 2025 LuisD3vv</a
      >
    </footer>
  </body>
</html>
